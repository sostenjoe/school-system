<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Settings</title>
<link rel="stylesheet" href="../../style.css">
</head>
<body>

<div class="settings-container">
  <div class="settings-card">
    <div class="settings-header">
      <h1>Admin Settings</h1>
      <button class="back-btn" id="backBtn">Back</button>
    </div>

    <div class="form-section">
      <h3>Assign Subject to Teacher</h3>

      <div class="info-box">
        <p>Select a registered teacher and choose the subject they should teach.</p>
      </div>

      <form id="assignmentForm">
        <div class="form-group">
          <label for="teacherSelect">Teacher *</label>
          <select id="teacherSelect" required>
            <option value="">Loading teachers...</option>
          </select>
        </div>

        <div class="form-group">
          <label>Subjects * (Hold Ctrl/Cmd to select multiple)</label>
          <div class="multi-select-container">
            <select id="subjectSelect" multiple size="5">
              <option value="">Loading subjects...</option>
            </select>
          </div>
          <p class="form-hint">Hold Ctrl (Windows) or Cmd (Mac) to select multiple subjects</p>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save">Assign Subjects</button>
        </div>

        <div id="assignmentMessage" class="message"></div>
      </form>
    </div>

    <div class="form-section">
      <h3>Change Credentials</h3>

      <div class="info-box">
        <p>Update your admin username and password. Your current password is required to make changes.</p>
      </div>

      <form id="credentialsForm">
        <div class="form-group">
          <label for="currentPassword">Current Password *</label>
          <input type="password" id="currentPassword" placeholder="Enter your current password" required>
        </div>

        <div class="form-group">
          <label for="newUsername">New Username (leave blank to keep current)</label>
          <input type="text" id="newUsername" placeholder="Enter new username">
        </div>

        <div class="form-group">
          <label for="newPassword">New Password (leave blank to keep current)</label>
          <input type="password" id="newPassword" placeholder="Enter new password (min 6 characters)">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm new password">
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save">Save Changes</button>
        </div>

        <div id="message" class="message"></div>
      </form>
    </div>
  </div>
</div>

<script src="../admin-settings.js"></script>
</body>
</html>
