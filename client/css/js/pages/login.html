<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Management System</title>
<link rel="stylesheet" href="../../style.css">
</head>
<body>

<div class="login-page">
  <div class="login-box">
    <h1>📚 School Portal</h1>
    <p class="login-subtitle">Professional education management system</p>

    <div class="role-selector">
      <button type="button" class="role-button active" id="teacherRole">
        👨‍🏫 Teacher
      </button>
      <button type="button" class="role-button" id="adminRole">
        🔐 Admin
      </button>
    </div>

    <!-- Teacher Section -->
    <div id="teacherSection" class="auth-section active">
      <nav class="auth-tabs">
        <button type="button" id="showLogin" class="active">Sign In</button>
        <button type="button" id="showRegister">Register</button>
        <button type="button" id="showForgot">Forgot Password</button>
      </nav>

      <form id="loginForm" class="auth-form active">
        <input type="email" id="email" placeholder="📧 Email Address" required>
        <input type="password" id="password" placeholder="🔒 Password" required>
        <button type="submit">Sign In</button>
      </form>

      <form id="registerForm" class="auth-form">
        <input type="text" id="registerName" placeholder="👤 Full Name" required>
        <input type="email" id="registerEmail" placeholder="📧 Email Address" required>
        <input type="password" id="registerPassword" placeholder="🔒 Password (Min 6 chars)" required>
        <button type="submit">Create Account</button>
      </form>

      <form id="forgotForm" class="auth-form">
        <input type="email" id="forgotEmail" placeholder="📧 Email Address" required>
        <button type="submit">Send Reset Code</button>
      </form>

      <form id="resetForm" class="auth-form">
        <input type="email" id="resetEmail" placeholder="📧 Email Address" required>
        <input type="text" id="resetCode" placeholder="✉️ Reset Code from Email" required>
        <input type="password" id="resetPassword" placeholder="🔒 New Password" required>
        <button type="submit">Reset Password</button>
      </form>

      <p id="message"></p>
    </div>

    <!-- Admin Section -->
    <div id="adminSection" class="auth-section">
      <h3 style="text-align: center; margin-bottom: 20px; font-size: 1.1rem; font-weight: 700; color: #111827;">
        🔐 Admin Console
      </h3>
      
      <form id="adminLoginForm" class="auth-form active">
        <input type="text" id="adminUsername" placeholder="👤 Admin Username" required>
        <input type="password" id="adminPassword" placeholder="🔒 Admin Password" required>
        <button type="submit">Admin Login</button>
      </form>

      <p id="adminMessage"></p>
      
      <div class="admin-note">
        <strong>⚠️ Default Credentials:</strong><br>
        Username: <code>admin</code><br>
        Password: <code>admin</code><br>
        <small>⚡ Change immediately after first login</small>
      </div>
    </div>

  </div>
</div>

<script src="../login.js"></script>
</body>
</html>
