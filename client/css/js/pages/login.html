<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Access</title>
<link rel="stylesheet" href="../../style.css">
</head>
<body>

<div class="login-page">
  <div class="login-box">
    <h1>Teacher Portal</h1>
    <p class="login-subtitle">Use your email to sign in, register a teacher account, or reset your password.</p>

    <nav class="auth-tabs">
      <button type="button" id="showLogin" class="active">Sign In</button>
      <button type="button" id="showRegister">Register</button>
      <button type="button" id="showForgot">Forgot Password</button>
    </nav>

    <form id="loginForm" class="auth-form active">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <form id="registerForm" class="auth-form">
      <input type="text" id="registerName" placeholder="Full Name" required>
      <input type="email" id="registerEmail" placeholder="Email" required>
      <input type="password" id="registerPassword" placeholder="Password" required>
      <button type="submit">Create Account</button>
    </form>

    <form id="forgotForm" class="auth-form">
      <input type="email" id="forgotEmail" placeholder="Email for password reset" required>
      <button type="submit">Send Reset Code</button>
    </form>

    <form id="resetForm" class="auth-form">
      <input type="email" id="resetEmail" placeholder="Email" required>
      <input type="text" id="resetCode" placeholder="Reset Code" required>
      <input type="password" id="resetPassword" placeholder="New Password" required>
      <button type="submit">Reset Password</button>
    </form>

    <p id="message"></p>
  </div>
</div>

<script src="../login.js"></script>
</body>
</html>
